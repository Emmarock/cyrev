<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cyrev Notification</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f4f6fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .wrapper {
      width: 100%;
      padding: 40px 0;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo img {
      width: 140px;
    }

    h1 {
      font-size: 22px;
      color: #111827;
      margin-bottom: 16px;
    }

    p {
      font-size: 15px;
      color: #4b5563;
      line-height: 1.6;
      margin: 10px 0;
    }

    .cta {
      text-align: center;
      margin: 28px 0;
    }

    .button {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: #ffffff !important;
      text-decoration: none;
      padding: 14px 22px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      display: inline-block;
    }

    .meta {
      font-size: 13px;
      color: #9ca3af;
      margin-top: 20px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin-top: 30px;
      border-top: 1px solid #f0f0f0;
      padding-top: 16px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
    }
  </style>
</head>

<body>
<div class="wrapper">
  <div class="container">

    <!-- 🔥 LOGO -->
    <div class="logo">
      <img src="data:image/svg+xml,%3c?xml%20version=%271.0%27%20e…0-37.16,30.13-67.29,67.29-67.29Z%27/%3e%3c/svg%3e" alt="Cyrev Logo"/>
    </div>

    <!-- 🔥 TITLE -->
    <title>New Login Detected</title>

    <!-- 🔥 BODY -->
    <h2>🔐 New Login to Your Account</h2>
    <p>Hi {{firstname}},</p>
    <p>We noticed a new login to your Cyrev account.</p>
    <p><strong>Email:</strong> {{email}}</p>
    <p>If this was you, no action is needed.</p>
    <p>If not, please reset your password immediately </p>

    <div class="cta">
      <a
              href="mailto:{{supportEmail}}?subject=Urgent%20Security%20Issue&body=If%20you%20did%20not%20initiate%20this,%20please%20contact%20support%20immediately."
              class="button"
      >
        Contact Support
      </a>
    </div>
    <!-- 🔥 FOOTER -->
    <div class="footer">
      © {{year}} Cyrev. All rights reserved.
    </div>

  </div>
</div>
</body>
</html>
