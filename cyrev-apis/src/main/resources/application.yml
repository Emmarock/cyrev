app:
  base-url: https://cybrooke.vercel.app
spring:
  main:
    lazy-initialization: true
  security:
    oauth2:
      client:
        registration:
          microsoft:
            client-name: Microsoft
            client-id: ${ENTRA_CLIENT_ID}
            client-secret: ${ENTRA_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: ${app.base-url}/api/auth/callback
            scope:
              - openid
              - profile
              - email
              - User.Read
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub
      resourceserver:
        jwt:
          issuer-uri: https://login.microsoftonline.com/common/v2.0
  application:
    name: cyrev-iam-provisioning
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update   # change to validate or none in prod if needed
    show-sql: true
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: smtp.gmail.com
    port: 587
    username: noreply@cyrev.com
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
logging:
  level:
    root: INFO
    com.company.iam: DEBUG

scim:
  enabled: true
  base-path: /scim/v2
  auth:
    username: admin
    password: admin
  token: scim-secret-xyz
  atlassian:
    base-url: https://cybrooke.atlassian.net/
    directory-id: 8ad1920-op8799-oapp-09945
rbac:
  default-role: EMPLOYEE

approval:
  auto-approve-apps:
    - SLACK

adapters:
  slack:
    api-url: https://slack.com/api
    token: xoxb-your-slack-token
  jira:
    api-url: https://cybrooke.atlassian.net/rest/api/3
    username: jira-bot
    api-token: your-jira-token
    scim:
      url: https://cybrooke.atlassian.net/

  bitbucket:
    baseurl: https://api.bitbucket.org/2.0
    username: apatababajide@gmail.com
    app-password:
    workspace: cybrookes
security:
  jwt:
    secret: ${JWT_SECRET:VERY_LONG_RANDOM_SECRET_32_CHARS_MIN}
    expiry: 3600000 # 1 hour
    mfa-expiry: 900000 # 15 mins

server:
  port: 8090
management:
  endpoint:
    health:
      show-details: always
    web:
      exposure:
        include: "*"

azure:
  tenant-id: ${AZURE_TENANT_ID}
  app-id: ${AZURE_APP_ID}
  client-secret: ${AZURE_CLIENT_SECRET}
microsoft:
  graph:
    base-url: https://graph.microsoft.com/v1.0
    tenant-id: ${AZURE_TENANT_ID}
entra:
  client-id: ${ENTRA_CLIENT_ID}
  client-secret: ${ENTRA_CLIENT_SECRET}
  app-id: ${AZURE_APP_ID}
  redirect-uri: ${app.base-url}/api/entra/admin-consent-callback
  auth-redirect-uri: ${app.base-url}/api/auth/callback
  authority: https://login.microsoftonline.com
  auth-token-url: https://login.microsoftonline.com/common/oauth2/v2.0/token
sendgrid:
  api-key: ${SENDGRID_API_KEY}
  from-email: info@ayokunmidapo.com
redis:
  enabled: false
token:
  blacklist:
    max-size: 10_000
    default-ttl-seconds: 3600